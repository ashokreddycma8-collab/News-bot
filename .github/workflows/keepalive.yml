name: Keepalive

on:
  schedule:
    - cron: '0 6 * * 0'    # Sunday 06:00 UTC (market closed, no conflict)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Touch repo with empty commit
        run: |
          set -euo pipefail
          git config user.email "action@github.com"
          git config user.name  "GitHub Action"
          git commit --allow-empty -m "keepalive $(date -u +'%Y-%m-%dT%H:%MZ')"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
