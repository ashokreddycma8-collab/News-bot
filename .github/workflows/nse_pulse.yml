name: NSE Market Pulse
 
on:
  schedule:
    # Runs every 15 min on weekdays during IST market hours
    # GitHub Actions uses UTC — IST is UTC+5:30
    # 9:00 IST  = 3:30 UTC
    # 15:45 IST = 10:15 UTC
    - cron: '30 3 * * 1-5'    # 9:00 IST
    - cron: '45 3 * * 1-5'    # 9:15 IST
    - cron: '0 4 * * 1-5'     # 9:30 IST
    - cron: '15 4 * * 1-5'    # 9:45 IST
    - cron: '30 4 * * 1-5'    # 10:00 IST
    - cron: '45 4 * * 1-5'    # 10:15 IST
    - cron: '0 5 * * 1-5'     # 10:30 IST
    - cron: '15 5 * * 1-5'    # 10:45 IST
    - cron: '30 5 * * 1-5'    # 11:00 IST
    - cron: '45 5 * * 1-5'    # 11:15 IST
    - cron: '0 6 * * 1-5'     # 11:30 IST
    - cron: '15 6 * * 1-5'    # 11:45 IST
    - cron: '30 6 * * 1-5'    # 12:00 IST
    - cron: '45 6 * * 1-5'    # 12:15 IST
    - cron: '0 7 * * 1-5'     # 12:30 IST
    - cron: '15 7 * * 1-5'    # 12:45 IST
    - cron: '30 7 * * 1-5'    # 13:00 IST
    - cron: '45 7 * * 1-5'    # 13:15 IST
    - cron: '0 8 * * 1-5'     # 13:30 IST
    - cron: '15 8 * * 1-5'    # 13:45 IST
    - cron: '30 8 * * 1-5'    # 14:00 IST
    - cron: '45 8 * * 1-5'    # 14:15 IST
    - cron: '0 9 * * 1-5'     # 14:30 IST
    - cron: '15 9 * * 1-5'    # 14:45 IST
    - cron: '30 9 * * 1-5'    # 15:00 IST
    - cron: '45 9 * * 1-5'    # 15:15 IST
    - cron: '0 10 * * 1-5'    # 15:30 IST
    - cron: '15 10 * * 1-5'   # 15:45 IST
 
  # Allow manual trigger from GitHub website
  workflow_dispatch:
 
jobs:
  run-pulse:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run NSE Market Pulse
        env:
         import os
GROQ_KEY       = os.getenv("GROQ_KEY")
NEWSAPI_KEY    = os.getenv("NEWSAPI_KEY")
MARKETAUX_KEY  = os.getenv("MARKETAUX_KEY", "")
TELEGRAM_TOKEN = os.getenv("TELEGRAM_TOKEN")
CHAT_ID        = os.getenv("CHAT_ID")
        run: python nse_market_pulse_free.py test
 
